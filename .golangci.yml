version: 2
run:
  timeout: 5m
  allow-parallel-runners: true
  go: "1.25"
linters-settings:
  gosec:
    excludes:
      - G402
  staticcheck:
    checks: ["all", "-SA5001"]
  funlen:
    lines: 80
    statements: 70
  revive:
    rules:
      - name: var-naming
        arguments: [["ID"]]
linters:
  # inverted configuration with `enable-all` and `disable` is not scalable during updates of golangci-lint
  disable-all: true
  enable:
    - asciicheck
    - bodyclose
    - bidichk
    - cyclop
    - decorder
    - dogsled
    - errcheck
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace

issues:
  exclude-rules:
    - linters:
        - typecheck
      text: "file requires newer Go version"
    - path: "_test\\.go"
      linters:
        - funlen

  # don't enable:
  # - godox
  # - maligned,prealloc
  # - gochecknoglobals
  # - golint
  # - gochecknoinits
