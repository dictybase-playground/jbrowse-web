version: "2"
run:
  timeout: 5m
  allow-parallel-runners: true
  go: "1.25"
linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - bidichk
    - cyclop
    - decorder
    - dogsled
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    gosec:
      excludes:
        - G402
    staticcheck:
      checks: ["all", "-SA5001"]
    funlen:
      lines: 80
      statements: 70
    revive:
      rules:
        - name: var-naming
          arguments: [["ID"]]
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: "_test\\.go"
        linters:
          - funlen
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
    - goimports
    - golines
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(dictybase-playground/jbrowse-cli)
    golines:
      max-len: 65
      chain-split-dots: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
